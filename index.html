<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rock Paper Scissors | Atharv Pathak</title>
    <link rel="shortcut icon" href="assets\favicon.png" type="image/x-icon" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <span class="left">Rock Paper Scissors</span>
      <!-- <span class="right">Made by - Atharv Pathak</span> -->

      <button class="reset">Reset</button>
    </header>

    <div class="input">
      <label for="points">Game of Points: </label>
      <input id="points" type="number" min="1" placeholder="Enter a number" />
      <input id="submit" type="submit" />
      <span> or Play Infintely</span>
    </div>
    <main>
      <div class="selector">
        <div class="img" id="div-img1">
          <img src="assets/stone.png" alt="stone" class="circle" id="img1" />
        </div>
        <div class="img" id="div-img2">
          <img src="assets/paper.png" alt="paper" class="circle" id="img2" />
        </div>
        <div class="img" id="div-img3">
          <img
            src="assets/scissors.png"
            alt="scisssors"
            class="circle"
            id="img3"
          />
        </div>
      </div>

      <div class="div-hands">
        <div class="left-hand">
          <img src="assets/stone-L.png" alt="" class="hand-L" id="l0" />
          <img src="assets/paper-L.png" alt="" class="hand-L" id="l1" />
          <img src="assets/scissors-L.png" alt="" class="hand-L" id="l2" />
        </div>
        <div class="right-hand">
          <img src="assets/stone-R.png" alt="" class="hand-R" id="r0" />
          <img src="assets/paper-R.png" alt="" class="hand-R" id="r1" />
          <img src="assets/scissors-R.png" alt="" class="hand-R" id="r2" />
        </div>
      </div>

      <div class="content">
        <div class="text">Select among rock, paper and scissors</div>

        <button class="next hidden">Next Round</button>
        <div class="scorecard">
          <div class="you-label">You</div>
          <div class="robot-label">Robot</div>
          <div class="you">0</div>
          <div class="robot">0</div>
        </div>
      </div>
    </main>
    <footer>
      <span>Created by <b>Atharv Pathak</b></span>

      <a class="footer-a" href="https://github.com/PathaksOP">
        <div class="footer-div">
          <img class="footer-img" src="assets/github.png" alt="github-img" />
          <span>GitHub</span>
        </div>
      </a>
      <a class="footer-a" href="mailto:namitapathak1983@gmail.com">
        <div class="footer-div">
          <img
            class="footer-img gmail"
            src="assets/gmail.jpg"
            alt="gmail-img"
          />
          <span>Gmail</span>
        </div>
      </a>
    </footer>
    <script src="script.js"></script>
  </body>
</html>
